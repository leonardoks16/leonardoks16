name: GitHub Metrics

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Store the token only as the METRICS_TOKEN Actions secret.
          # Private repository information must remain aggregated.
          token: ${{ secrets.METRICS_TOKEN }}
          user: leonardoks16
          filename: github-metrics.svg

          template: classic
          base: header, activity, repositories, metadata
          base_indepth: yes
          config_timezone: America/Sao_Paulo
          repositories_affiliations: owner, collaborator
          #commits_authoring: leonardoks16, nexxus, leonardoso@pm.me, leonardosyo@gmail.com, Nexxus

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
