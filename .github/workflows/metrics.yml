name: GitHub Metrics

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Store the token only as the METRICS_TOKEN Actions secret.
          # Private repository information must remain aggregated.
          token: ${{ secrets.METRICS_TOKEN }}
          user: leonardoks16
          filename: github-metrics.svg

          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15

          plugin_repositories: yes
          plugin_repositories_pinned: 6
          plugin_repositories_starred: 4
          plugin_repositories_forks: no
          plugin_repositories_affiliations: owner, collaborator, organization_member
