name: GitHub Metrics

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write

    steps:
      - name: GitHub profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: leonardoks16
          filename: github-metrics.svg

          template: classic
          config_display: large
          base: header, activity, repositories, metadata
          base_indepth: yes
          config_timezone: America/Sao_Paulo
          repositories_affiliations: owner, collaborator
          # commits_authoring: leonardoks16, nexxus, leonardoso@pm.me, leonardosyo@gmail.com, Nexxus

      - name: Svarin Labs blog metrics
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: blog-metrics.svg

          template: classic
          base: ""
          config_display: large
          config_timezone: America/Sao_Paulo

          plugin_pagespeed: yes
          plugin_pagespeed_url: https://blog.svarinlabs.com
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_pwa: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}

      # TODO: SHOW LAST ARTICLES FROM BLOG
